<!DOCTYPE html>

<title>나의 일정</title>

<style>
body{
    font-family: "맑은 고딕";
}

h2{
    margin-left: 20px;
}

.month{
    width: 900px;
    text-align: center;
    font-size: 18px;
    margin: 20px 0 10px 20px;
}

table{
    width: 900px;
    border-collapse: collapse;
    table-layout: fixed;
    margin-left: 20px;
    margin-bottom: 40px;
}

th, td{
    border: 1px solid #cccccc;
}

th{
    height: 35px;
    background-color: #fafafa;
}

td{
    height: 90px;
    vertical-align: top;
    padding: 6px;
}

.sun{
    color: red;
}

.sat{
    color: blue;
}

.other{
    color: gray;
}

.schedule{
    margin-top: 5px;
    font-size: 13px;
}
</style>
</head>
